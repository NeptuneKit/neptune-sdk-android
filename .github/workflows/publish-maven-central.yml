name: Publish To Maven Central

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version (e.g. 1.2.3 or 2026.3.26). Leave empty to use tag name."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Publish to Maven local only"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve publish version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version_input="${{ inputs.version }}"
          version_name="${version_input}"

          if [[ -z "${version_name}" ]]; then
            if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
              echo "workflow_dispatch from branch requires inputs.version" >&2
              exit 1
            fi
            version_name="${GITHUB_REF_NAME}"
          fi

          version_name="${version_name#v}"

          if [[ ! "${version_name}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]] && [[ ! "${version_name}" =~ ^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}(\.[0-9]+)?$ ]]; then
            echo "invalid version: ${version_name}" >&2
            exit 1
          fi

          printf 'version_name=%s\n' "${version_name}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Run SDK tests
        run: ./gradlew :sdk:test

      - name: Dry run publish to local Maven
        if: ${{ inputs.dry_run }}
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: |
          ./gradlew :sdk:publishToMavenLocal \
            -PVERSION_NAME="${{ steps.version.outputs.version_name }}"

      - name: Publish to Maven Central (Central Portal OSSRH Staging API)
        if: ${{ !inputs.dry_run }}
        env:
          ORG_GRADLE_PROJECT_MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
        run: |
          ./gradlew :sdk:publish \
            -PVERSION_NAME="${{ steps.version.outputs.version_name }}"

      - name: Trigger Central Portal manual upload
        if: ${{ !inputs.dry_run }}
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_NAMESPACE: ${{ secrets.MAVEN_CENTRAL_NAMESPACE }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${MAVEN_CENTRAL_NAMESPACE:-}" ]]; then
            echo "Missing secret MAVEN_CENTRAL_NAMESPACE" >&2
            exit 1
          fi

          auth="$(printf '%s:%s' "${MAVEN_CENTRAL_USERNAME}" "${MAVEN_CENTRAL_PASSWORD}" | base64 | tr -d '\n')"

          curl --fail-with-body --request POST \
            --url "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${MAVEN_CENTRAL_NAMESPACE}" \
            --header "Authorization: Bearer ${auth}" \
            --header "Accept: application/json"
